model:
  name: "Qwen/Qwen2.5-1.5B-Instruct"

embedding:
  model: "sentence-transformers/all-MiniLM-L6-v2"

retrieval:
  top_k: 5
  chunk_size: 1500
  chunk_overlap: 80
  faiss_candidates: 30

generation:
  max_new_tokens: 300
  temperature: 0.3

paths:
  raw_data: "data/raw"
  vectorstore: "data/vectorstore"

